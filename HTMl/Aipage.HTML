<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SNAKE</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #0f0f1a;
      --border: #1a1a2e;
      --accent: #00ff88;
      --accent-dim: #00ff8844;
      --accent2: #ff2d55;
      --accent3: #00cfff;
      --text: #c8d8e8;
      --text-dim: #556677;
      --snake-head: #00ff88;
      --snake-body: #00cc66;
      --food: #ff2d55;
      --glow: 0 0 20px #00ff8866;
      --glow2: 0 0 20px #ff2d5566;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    header { text-align: center; }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: 0.3em;
      color: var(--accent);
      text-shadow: var(--glow), 0 0 60px #00ff8833;
      animation: flicker 6s infinite;
    }

    @keyframes flicker {
      0%, 97%, 100% { opacity: 1; }
      98% { opacity: 0.85; }
      99% { opacity: 1; }
      99.5% { opacity: 0.9; }
    }

    .tagline {
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      color: var(--text-dim);
      margin-top: 4px;
      text-transform: uppercase;
    }

    .stats {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .stat-block { text-align: center; }

    .stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent3);
      text-shadow: 0 0 15px #00cfff88;
      min-width: 60px;
      display: block;
    }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: var(--border);
    }

    .canvas-wrap {
      position: relative;
      border: 1px solid var(--accent-dim);
      box-shadow: var(--glow), inset 0 0 60px rgba(0,255,136,0.02);
      background: var(--panel);
    }

    .canvas-wrap::before,
    .canvas-wrap::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--accent);
      border-style: solid;
    }
    .canvas-wrap::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }
    .canvas-wrap::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    canvas { display: block; }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,15,0.92);
      gap: 16px;
      transition: opacity 0.3s;
    }

    .overlay.hidden { display: none; }

    .overlay-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.2em;
    }

    .overlay-title.green { color: var(--accent); text-shadow: var(--glow); }
    .overlay-title.red { color: var(--accent2); text-shadow: var(--glow2); }

    .overlay-sub {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--text-dim);
    }

    .final-score {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent3);
      text-shadow: 0 0 20px #00cfff88;
    }

    .btn {
      margin-top: 8px;
      padding: 10px 36px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: var(--bg);
      background: var(--accent);
      border: none;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .btn:hover {
      background: #fff;
      box-shadow: 0 0 30px var(--accent);
      transform: scale(1.04);
    }

    .controls {
      display: flex;
      gap: 24px;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
    }

    .key {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 2px 7px;
      color: var(--text);
      font-size: 0.6rem;
      margin-right: 5px;
    }

    .speed-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.2em;
    }

    .speed-pips { display: flex; gap: 4px; }

    .pip {
      width: 18px;
      height: 5px;
      background: var(--border);
      transition: background 0.3s;
    }
    .pip.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
  <header>
    <h1>SNAKE</h1>
    <p class="tagline">arcade edition &nbsp;·&nbsp; v2.0</p>
  </header>

  <div class="stats">
    <div class="stat-block">
      <span class="stat-label">Score</span>
      <span class="stat-value" id="scoreDisplay">000</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-block">
      <span class="stat-label">Best</span>
      <span class="stat-value" id="bestDisplay">000</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-block">
      <span class="stat-label">Level</span>
      <span class="stat-value" id="levelDisplay">01</span>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="game" width="420" height="420"></canvas>

    <div class="overlay" id="startScreen">
      <div class="overlay-title green">READY?</div>
      <div class="overlay-sub">Use arrow keys or WASD to move</div>
      <button class="btn" id="startBtn">START GAME</button>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
      <div class="overlay-title red">GAME OVER</div>
      <div class="final-score" id="finalScore">0</div>
      <div class="overlay-sub">SCORE</div>
      <button class="btn" id="restartBtn">PLAY AGAIN</button>
    </div>
  </div>

  <div class="speed-bar">
    <span>SPEED</span>
    <div class="speed-pips" id="speedPips">
      <div class="pip active"></div>
      <div class="pip"></div>
      <div class="pip"></div>
      <div class="pip"></div>
      <div class="pip"></div>
    </div>
  </div>

  <div class="controls">
    <span><span class="key">↑↓←→</span> Move</span>
    <span><span class="key">WASD</span> Move</span>
    <span><span class="key">P</span> Pause</span>
  </div>
</div>

<script>
  const COLS = 21, ROWS = 21;
  const CELL = 20;
  const SPEEDS = [140, 120, 100, 80, 65];

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  let snake, dir, nextDir, food, score, best, level, gameLoop, running, paused;

  function init() {
    snake = [
      { x: 10, y: 10 },
      { x: 9,  y: 10 },
      { x: 8,  y: 10 },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    level = 1;
    running = true;
    paused = false;
    best = parseInt(localStorage.getItem('snakeBest') || '0');
    updateUI();
    placeFood();
    clearInterval(gameLoop);
    tick();
  }

  function tick() {
    if (!running || paused) return;
    update();
    draw();
    gameLoop = setTimeout(tick, SPEEDS[Math.min(level - 1, SPEEDS.length - 1)]);
  }

  function update() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      endGame(); return;
    }
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame(); return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += level * 10;
      level = Math.floor(score / 80) + 1;
      updateUI();
      updateSpeedPips();
      spawnFoodParticles();
      placeFood();
    } else {
      snake.pop();
    }
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
    food.pulse = 0;
  }

  function draw() {
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawFood();
    drawSnake();
  }

  function drawGrid() {
    ctx.strokeStyle = 'rgba(0,255,136,0.04)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, 0);
      ctx.lineTo(x * CELL, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL);
      ctx.lineTo(canvas.width, y * CELL);
      ctx.stroke();
    }
  }

  function drawSnake() {
    snake.forEach((seg, i) => {
      const x = seg.x * CELL, y = seg.y * CELL;
      const ratio = i / snake.length;
      const alpha = 1 - ratio * 0.55;

      if (i === 0) {
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 18;
        ctx.fillStyle = '#00ff88';
      } else {
        ctx.shadowColor = '#00cc66';
        ctx.shadowBlur = 6;
        ctx.fillStyle = `rgba(0, ${Math.floor(180 - ratio * 60)}, ${Math.floor(80 - ratio * 20)}, ${alpha})`;
      }

      const pad = i === 0 ? 1 : 2;
      roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, i === 0 ? 4 : 3);
      ctx.fill();
      ctx.shadowBlur = 0;

      if (i === 0) {
        ctx.fillStyle = '#0a0a0f';
        const eyeSize = 2.5;
        let ex1, ey1, ex2, ey2;
        if (dir.x === 1)       { ex1 = x+14; ey1 = y+5;  ex2 = x+14; ey2 = y+12; }
        else if (dir.x === -1) { ex1 = x+4;  ey1 = y+5;  ex2 = x+4;  ey2 = y+12; }
        else if (dir.y === -1) { ex1 = x+5;  ey1 = y+4;  ex2 = x+12; ey2 = y+4; }
        else                   { ex1 = x+5;  ey1 = y+14; ex2 = x+12; ey2 = y+14; }
        ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI*2); ctx.fill();
      }
    });
  }

  function drawFood() {
    food.pulse = (food.pulse || 0) + 0.1;
    const px = food.x * CELL + CELL / 2;
    const py = food.y * CELL + CELL / 2;
    const pulse = Math.sin(food.pulse) * 2;
    const r = 6 + pulse;

    ctx.shadowColor = '#ff2d55';
    ctx.shadowBlur = 20 + pulse * 3;

    const grad = ctx.createRadialGradient(px - 2, py - 2, 1, px, py, r);
    grad.addColorStop(0, '#ff8899');
    grad.addColorStop(1, '#ff2d55');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(px - 2, py - 2, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function updateUI() {
    document.getElementById('scoreDisplay').textContent = String(score).padStart(3, '0');
    document.getElementById('bestDisplay').textContent = String(Math.max(score, best)).padStart(3, '0');
    document.getElementById('levelDisplay').textContent = String(level).padStart(2, '0');
  }

  function updateSpeedPips() {
    const pips = document.querySelectorAll('.pip');
    const active = Math.min(level, pips.length);
    pips.forEach((p, i) => p.classList.toggle('active', i < active));
  }

  function endGame() {
    running = false;
    clearTimeout(gameLoop);
    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
    }
    updateUI();
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOverScreen').classList.remove('hidden');

    let flashes = 0;
    const flash = setInterval(() => {
      ctx.fillStyle = `rgba(255, 45, 85, ${0.15 - flashes * 0.02})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (++flashes > 6) clearInterval(flash);
    }, 60);
  }

  // Particles
  const pCanvas = document.getElementById('particles');
  const pCtx = pCanvas.getContext('2d');
  let particles = [];

  function resizeParticles() {
    pCanvas.width = window.innerWidth;
    pCanvas.height = window.innerHeight;
  }
  resizeParticles();
  window.addEventListener('resize', resizeParticles);

  function spawnFoodParticles() {
    const rect = canvas.getBoundingClientRect();
    const fx = rect.left + food.x * CELL + CELL / 2;
    const fy = rect.top + food.y * CELL + CELL / 2;
    for (let i = 0; i < 14; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 3;
      particles.push({
        x: fx, y: fy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.025 + Math.random() * 0.02,
        size: 2 + Math.random() * 3,
        color: Math.random() > 0.5 ? '#ff2d55' : '#ff8899'
      });
    }
  }

  function animateParticles() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      p.life -= p.decay;
      pCtx.globalAlpha = Math.max(0, p.life);
      pCtx.fillStyle = p.color;
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      pCtx.fill();
    });
    pCtx.globalAlpha = 1;
    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  // Input
  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1},
      ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
      w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0},
      W: {x:0,y:-1}, S: {x:0,y:1}, A: {x:-1,y:0}, D: {x:1,y:0},
    };
    if (map[e.key]) {
      const nd = map[e.key];
      if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
      e.preventDefault();
    }
    if ((e.key === 'p' || e.key === 'P') && running) {
      paused = !paused;
      if (!paused) tick();
    }
  });

  // Touch support
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) > Math.abs(dy)) {
      const nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
      if (nd.x !== -dir.x) nextDir = nd;
    } else {
      const nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
      if (nd.y !== -dir.y) nextDir = nd;
    }
    touchStart = null;
    e.preventDefault();
  }, { passive: false });

  document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('startScreen').classList.add('hidden');
    init();
  });
  document.getElementById('restartBtn').addEventListener('click', () => {
    document.getElementById('gameOverScreen').classList.add('hidden');
    init();
  });

  draw();
</script>
</body>
</html>
